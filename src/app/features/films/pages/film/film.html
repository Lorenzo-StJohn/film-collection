<div class="film">
  @if (film) {
    <h2 class="title">
      {{ film.title }}
    </h2>
    <p><span class="bold">Year: </span>{{ film.year }}</p>
    <p><span class="bold">Genre: </span>{{ film.genre }}</p>
    <p><span class="bold">Rating: </span>{{ film.rating }}</p>
    <p><span class="bold">Duration: </span>{{ film.duration | duration }}</p>
    <p><span class="bold">Description: </span>{{ film.description }}</p>
    <img [src]="film.posterUrl" [alt]="film.title" class="poster" />
  } @else {
    <p>No film found</p>
  }
</div>
<a routerLink="/home" class="home-link">← To the film list</a>
